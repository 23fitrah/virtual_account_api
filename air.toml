root = "."
tmp_dir = "tmp"

[build]
# Command untuk build binary (Windows menggunakan .exe)
cmd = "go build -o ./tmp/main.exe ./cmd/main.go"

# Lokasi binary hasil build
bin = "./tmp/main.exe"

# Ekstensi file yang dipantau
include_ext = ["go", "tpl", "tmpl", "html", "env"]

# Direktori yang diabaikan
exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git"]

# Regex untuk mengabaikan file tertentu (misal: file test)
exclude_regex = ["_test.go"]

# Delay sebelum rebuild (dalam ms)
delay = 500

# Hentikan proses jika terjadi error saat build
stop_on_error = true

# File log untuk error build
log = "air_errors.log"

[log]
# Tampilkan waktu pada log
time = true

[color]
# Konfigurasi warna output terminal
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Bersihkan file tmp saat exit
clean_on_exit = true
