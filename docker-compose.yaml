
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile-v1
    container_name: virtual_account_api-app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - va-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: virtual_account_api-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data/redis
    networks:
      - va-network
    restart: unless-stopped

networks:
  va-network:
    driver: bridge

volumes:
  redis_data:local